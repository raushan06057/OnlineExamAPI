<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Exam Result</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            color: #222;
        }

        .card {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .header {
            font-size: 20px;
            margin-bottom: 12px;
        }

        .result {
            font-size: 16px;
            margin: 8px 0;
        }

        .badge {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 4px;
            color: #fff;
            font-weight: 600;
        }

        .passed {
            background: #28a745;
        }

        .failed {
            background: #dc3545;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">Exam Result</div>
        <p>Hello <strong>{{UserName}}</strong>,</p>

        <p class="result">Marks obtained: <strong>{{MarksObtained}}</strong> / <strong>{{TotalMarks}}</strong></p>

        <p>
            Status:
            <span class="badge {{PassedClass}}">{{Passed}}</span>
        </p>

        <hr />
        <p>Regards,<br />OnlineExam Team</p>
    </div>
</body>
</html>
